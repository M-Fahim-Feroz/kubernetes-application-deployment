name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Build & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t node-app:latest .

      - name: Setup Kubeconform
        uses: bmuschko/setup-kubeconform@v1

      - name: Validate Raw Manifests
        run: kubeconform -summary -verbose -strict -ignore-missing-schemas k8s/

      - name: Lint Helm Chart
        run: helm lint helm/node-app

      - name: Template Helm Chart
        run: helm template node-app helm/node-app --debug

      - name: Security Scan (Trivy) on Manifests
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'config'
          scan-ref: 'k8s/'
          hide-progress: false
          format: 'table'
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
